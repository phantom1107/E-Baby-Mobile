name: e_baby
description: E-Baby Flutter Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  http: ^1.1.0
  provider: ^6.0.5
  shared_preferences: ^2.2.2
  intl: ^0.18.1
  image_picker: ^1.0.4
  cached_network_image: ^3.3.0
  flutter_secure_storage: ^9.0.0
  carousel_slider: ^5.0.0
  flutter_rating_bar: ^4.0.1
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  video_player: ^2.9.2
  flutter_map: ^6.0.0
  latlong2: ^0.9.0
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  firebase_storage: ^12.3.4
  cloudinary_public: ^0.21.0
  fl_chart: ^0.69.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false  # Disabled since we're only building for Android
  image_path: "assets/icon/app-icon.jpg"
  adaptive_icon_background: "#7C3AED"  # E-Baby purple
  adaptive_icon_foreground: "assets/icon/app-icon.jpg"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/logo/
    - assets/images/carousel/
    - assets/icon/
    - assets/videos/
